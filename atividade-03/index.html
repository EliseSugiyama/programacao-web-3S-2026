<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 03</title>
</head>
<body>
    <h1>DOM: Página Interativa com JavaScript</h1>
    <button id="incrementar">Incrementar</button>
    <button id="decrementar">Decrementar</button>
    <p>Valor: <span id="valor">0</span></p>
    <br><br>

    <input type="text" id="campo" placeholder="Digite algo...">
    <p>Caracteres (sem espaço): <span id="caracteres">0</span></p>
    <p>Texto Digitado: <span id="texto-digitado"></span></p>
    <br>
    <h4>Histórico: </h4>
    <ul id="historico"></ul>
    <br><br>

    <p>Escolha um tipo de lista: </p>
    <select id="tipo-lista">
        <option value="ul">Lista Não Ordenada</option>
        <option value="ol">Lista Ordenada</option>
    </select>
    <button id="lista">Adicionar Lista</button>
    <button id="item">Adicionar Item</button>
    <div id="lista-container"></div>
    <br><br>

    <button id="resetar">Resetar Tudo</button>

    <script src="script.js"></script>
</body>
</html>
